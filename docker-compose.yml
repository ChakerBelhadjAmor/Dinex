version: '3.8'

services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_AI_URL=http://localhost:3001
    depends_on:
      - backend
      - ai-service
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=flousna-hackathon-secret-2026
    restart: unless-stopped

  ai-service:
    build: ./ai
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped
