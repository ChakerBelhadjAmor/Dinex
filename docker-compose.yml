services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=flousna
      - POSTGRES_USER=flousna
      - POSTGRES_PASSWORD=flousna123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flousna"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "${BACKEND_HOST_PORT:-3005}:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=flousna-hackathon-secret-2026
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=flousna
      - DB_USER=flousna
      - DB_PASSWORD=flousna123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build: ./ai
    ports:
      - "${AI_HOST_PORT:-3002}:3001"
    environment:
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_HOST_PORT:-3005}
      - VITE_AI_URL=http://localhost:${AI_HOST_PORT:-3002}
    depends_on:
      - backend
      - ai-service
    restart: unless-stopped

volumes:
  pgdata:
